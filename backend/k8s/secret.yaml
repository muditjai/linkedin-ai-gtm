# Kubernetes Secret template for the LinkedIn AI GTM service backend.
#
# Per AGENTS.md "Secrets: ... Use environment variables for API keys and
# service credentials." and the "Secrets must be out of the repository"
# rule, this file is INTENDED to be filled in by an operator, NOT
# committed with real values. Use `kubectl create secret` directly OR
# copy this file, replace the placeholders, and `kubectl apply -f`.
#
# Generate the base64 values with:
#   echo -n '<value>' | base64
#
# Or, easier, create imperatively with the same key names so the
# deployment can read them via secretKeyRef:
#   kubectl create secret generic linkedin-ai-secrets \
#     --from-literal=mongodb-uri='mongodb+srv://USER:PASS@HOST/DB' \
#     --from-literal=gemini-api-key='AIza...' \
#     --from-literal=do-inference-token='dop_v1_...'
#
# Then `kubectl apply -f backend/k8s/deployment.yaml`.

apiVersion: v1
kind: Secret
metadata:
  name: linkedin-ai-secrets
  labels:
    app: linkedin-ai-backend
type: Opaque
stringData:
  # The connection string for the MongoDB deployment. Local dev default
  # is mongodb://localhost:27017/linkedin-ai; production should point
  # at the managed MongoDB cluster.
  mongodb-uri: "mongodb://CHANGEME:CHANGEME@mongodb:27017/linkedin-ai?authSource=admin"
  # Get from https://aistudio.google.com/app/apikey
  gemini-api-key: "CHANGEME_GEMINI_KEY"
  # Optional. Get from the DigitalOcean control panel after creating
  # an Inference workspace. If empty, the service falls back to Gemini.
  do-inference-token: "CHANGEME_DO_TOKEN"
